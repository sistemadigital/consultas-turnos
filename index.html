<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Consultas y Turnos Online | Defensoría Civil N°6</title>
    <!-- Google Fonts modernas: Inter + Montserrat -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700&family=Montserrat:wght@700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        /* ===== ESTILO VISUAL MODERNO (basado en referencia web.html, sin copiar) ===== */
        :root {
            --glass-bg: rgba(255, 255, 255, 0.86);
            --primary-text: #0f172a;
            --secondary-text: #334155;
            --accent-blue: #2563eb;
            --accent-green: #10b981;
            --accent-amber: #f59e0b;
            --card-shadow: 0 25px 35px -12px rgba(0, 0, 0, 0.08), 0 2px 6px rgba(0,0,0,0.02);
            --card-hover-shadow: 0 30px 40px -15px rgba(0, 0, 0, 0.15);
            --border-radius-card: 2rem;
            --transition-smooth: all 0.35s cubic-bezier(0.2, 0.9, 0.4, 1.1);
        }

        body {
            font-family: 'Inter', sans-serif;
            /* Fondo: gradientes radiales dinámicos (como referencia web.html) */
            background-color: #f1f5f9;
            background-image: 
                radial-gradient(at 0% 10%, hsla(210, 100%, 96%, 0.9) 0px, transparent 55%),
                radial-gradient(at 90% 80%, hsla(215, 95%, 92%, 0.85) 0px, transparent 60%),
                radial-gradient(at 40% 100%, hsla(220, 88%, 94%, 0.8) 0px, transparent 50%);
            background-attachment: fixed;
            color: var(--primary-text);
            line-height: 1.5;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        .container {
            width: 100%;
            max-width: 1280px;
            margin: 0 auto;
            padding: 0 24px;
        }

        /* Main content área flexible */
        .main-content {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            padding: 2.5rem 0 3rem;
        }

        /* Encabezado con efecto glass (similar al header de referencia) */
        .page-header {
            text-align: center;
            margin-bottom: 3.2rem;
            background: var(--glass-bg);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border-radius: 2.5rem;
            padding: 2rem 1.5rem;
            box-shadow: var(--card-shadow);
            border: 1px solid rgba(255, 255, 255, 0.75);
            transition: var(--transition-smooth);
        }

        .page-title {
            font-family: 'Montserrat', sans-serif;
            font-weight: 800;
            font-size: 2.2rem;
            letter-spacing: -0.02em;
            background: linear-gradient(135deg, #1e3a8a 0%, #2563eb 100%);
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
            margin-bottom: 0.5rem;
            display: inline-block;
        }

        /* línea decorativa sutil */
        .page-title::after {
            content: '';
            display: block;
            width: 70px;
            height: 4px;
            background: var(--accent-blue);
            margin: 0.7rem auto 0;
            border-radius: 4px;
            opacity: 0.7;
        }

        /* Grid de módulos - mantiene 3 columnas elegantes */
        .modules-container {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 2rem;
            margin: 1rem 0;
        }

        /* Tarjetas completamente renovadas (glass + sombras) */
        .module-card {
            background: var(--glass-bg);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border-radius: var(--border-radius-card);
            box-shadow: var(--card-shadow);
            padding: 2rem 1.8rem;
            text-align: center;
            transition: var(--transition-smooth);
            cursor: pointer;
            display: flex;
            flex-direction: column;
            align-items: center;
            position: relative;
            border: 1px solid rgba(255, 255, 255, 0.6);
        }

        .module-card:hover {
            transform: translateY(-8px);
            box-shadow: var(--card-hover-shadow);
            border-color: rgba(37, 99, 235, 0.3);
            background: rgba(255, 255, 255, 0.94);
        }

        /* Borde superior sutil (color por módulo) */
        .module-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 1.5rem;
            right: 1.5rem;
            height: 4px;
            border-radius: 4px;
            background: var(--primary);
            transition: all 0.2s;
        }

        /* Colores personalizados según módulo (modernos) */
        .module-card:nth-child(1)::before { background: var(--accent-blue); }
        .module-card:nth-child(2)::before { background: var(--accent-green); }
        .module-card:nth-child(3)::before { background: var(--accent-amber); }

        /* Iconos circulares con gradiente o fondo sólido moderno */
        .module-icon {
            width: 85px;
            height: 85px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 1.6rem;
            font-size: 2.6rem;
            color: white;
            transition: var(--transition-smooth);
            box-shadow: 0 10px 15px -6px rgba(0, 0, 0, 0.1);
        }

        .module-card:nth-child(1) .module-icon { background: var(--accent-blue); }
        .module-card:nth-child(2) .module-icon { background: var(--accent-green); }
        .module-card:nth-child(3) .module-icon { background: var(--accent-amber); }

        .module-title {
            font-family: 'Montserrat', sans-serif;
            font-weight: 800;
            font-size: 1.45rem;
            color: var(--primary-text);
            margin-bottom: 1.5rem;
            letter-spacing: -0.2px;
        }

        /* Botón de acceso (moderno, similar a enlace primario) */
        .module-link {
            display: inline-flex;
            align-items: center;
            gap: 0.65rem;
            background: rgba(37, 99, 235, 0.05);
            color: var(--accent-blue);
            font-weight: 700;
            text-decoration: none;
            padding: 0.75rem 1.6rem;
            border-radius: 60px;
            border: 1.5px solid rgba(37, 99, 235, 0.25);
            transition: all 0.25s ease;
            font-size: 0.95rem;
            margin-top: auto;
            backdrop-filter: blur(2px);
        }

        .module-card:nth-child(2) .module-link {
            color: var(--accent-green);
            border-color: rgba(16, 185, 129, 0.3);
            background: rgba(16, 185, 129, 0.05);
        }
        .module-card:nth-child(3) .module-link {
            color: var(--accent-amber);
            border-color: rgba(245, 158, 11, 0.3);
            background: rgba(245, 158, 11, 0.05);
        }

        .module-link:hover {
            transform: translateY(-2px);
            gap: 0.85rem;
        }
        .module-card:nth-child(1) .module-link:hover {
            background: var(--accent-blue);
            border-color: var(--accent-blue);
            color: white;
        }
        .module-card:nth-child(2) .module-link:hover {
            background: var(--accent-green);
            border-color: var(--accent-green);
            color: white;
        }
        .module-card:nth-child(3) .module-link:hover {
            background: var(--accent-amber);
            border-color: var(--accent-amber);
            color: white;
        }

        /* Footer con estilo refinado y vidrio */
        .footer {
            background: rgba(255, 255, 255, 0.8);
            backdrop-filter: blur(8px);
            border-top: 1px solid rgba(203, 213, 225, 0.5);
            color: var(--secondary-text);
            padding: 1.4rem 0;
            text-align: center;
            margin-top: 2rem;
            font-size: 0.85rem;
        }

        .developer-info {
            font-weight: 500;
        }

        .developer-name {
            font-weight: 700;
            color: var(--accent-blue);
            font-size: 0.9rem;
            margin-top: 4px;
        }

        /* Animación de entrada (fadeInUp) mantenida */
        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(26px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .fade-in {
            animation: fadeInUp 0.55s ease forwards;
            opacity: 0;
        }

        /* Responsive: ajustes finos */
        @media (max-width: 860px) {
            .modules-container {
                grid-template-columns: 1fr;
                max-width: 500px;
                margin-left: auto;
                margin-right: auto;
            }
            .page-title {
                font-size: 1.9rem;
            }
            .container {
                padding: 0 20px;
            }
            .main-content {
                padding: 1.5rem 0;
            }
        }

        @media (max-width: 480px) {
            .module-card {
                padding: 1.5rem;
            }
            .module-icon {
                width: 70px;
                height: 70px;
                font-size: 2rem;
            }
            .page-header {
                padding: 1.5rem;
            }
        }

        /* Mejora de accesibilidad y enfoque */
        .module-link:focus-visible {
            outline: 2px solid var(--accent-blue);
            outline-offset: 3px;
            border-radius: 50px;
        }
    </style>
</head>
<body>

    <main class="container main-content">
        <div class="page-header fade-in" style="animation-delay: 0.1s;">
            <h1 class="page-title">Consultas y Turnos Online</h1>
        </div>
        
        <div class="modules-container">
            <div class="module-card fade-in" style="animation-delay: 0.2s;" onclick="redirectToModule('clientes')">
                <div class="module-icon">
                    <i class="fas fa-users"></i>
                </div>
                <h3 class="module-title">App de Clientes</h3>
                <a href="https://sistemadigital.github.io/consultas-turnos/clientes" class="module-link" data-module="clientes">
                    Acceder al módulo <i class="fas fa-arrow-right"></i>
                </a>
            </div>
            
            <div class="module-card fade-in" style="animation-delay: 0.3s;" onclick="redirectToModule('defensores')">
                <div class="module-icon">
                    <i class="fas fa-user-tie"></i>
                </div>
                <h3 class="module-title">App Defensor-Secretarios</h3>
                <a href="https://sistemadigital.github.io/consultas-turnos/interno" class="module-link" data-module="defensores">
                    Acceder al módulo <i class="fas fa-arrow-right"></i>
                </a>
            </div>
            
            <div class="module-card fade-in" style="animation-delay: 0.4s;" onclick="redirectToModule('empleados')">
                <div class="module-icon">
                    <i class="fas fa-id-card"></i>
                </div>
                <h3 class="module-title">App Empleados asignados</h3>
                <a href="https://sistemadigital.github.io/consultas-turnos/asignados" class="module-link" data-module="empleados">
                    Acceder al módulo <i class="fas fa-arrow-right"></i>
                </a>
            </div>
        </div>
    </main>

    <footer class="footer">
        <div class="container">
            <p class="developer-info">Diseño y programación de: Rómulo Fioravante - Año 2026</p>
            <p class="developer-name">Defensoría Civil y Comercial 6 Ministerio Público de Misiones</p>
        </div>
    </footer>

    <script>
        // Función de redirección (original, sin cambios)
        function redirectToModule(module) {
            const urls = {
                clientes: 'https://sistemadigital.github.io/consultas-turnos/clientes',
                defensores: 'https://sistemadigital.github.io/consultas-turnos/interno',
                empleados: 'https://sistemadigital.github.io/consultas-turnos/asignados'
            };
            if (urls[module]) {
                window.location.href = urls[module];
            }
        }

        // Prevenir comportamiento por defecto y asegurar redirección (mismo código original)
        document.querySelectorAll('.module-link').forEach(link => {
            link.addEventListener('click', (e) => {
                e.preventDefault();
                e.stopPropagation();
                const module = link.getAttribute('data-module');
                if (module) redirectToModule(module);
            });
        });
    </script>
</body>
</html>
